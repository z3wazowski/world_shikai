<style>
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    display: inline-block;
    line-height: 1;
    text-transform: none;
    letter-spacing: normal;
    word-wrap: normal;
    white-space: nowrap;
    direction: ltr;
  }
  /* HUD corner decorations — four corners via ::before/::after + helper divs */
  .hud-frame { position: relative; }
  .hud-frame::before,
  .hud-frame::after {
    content: '';
    position: absolute;
    width: 24px;
    height: 24px;
    border-color: rgba(195, 244, 0, 0.4);
    pointer-events: none;
  }
  .hud-corner-tr,
  .hud-corner-bl {
    position: absolute;
    width: 24px;
    height: 24px;
    border-color: rgba(195, 244, 0, 0.4);
    pointer-events: none;
  }
  .hud-frame::before { top: 0; left: 0; border-top: 2px solid; border-left: 2px solid; }
  .hud-frame::after  { bottom: 0; right: 0; border-bottom: 2px solid; border-right: 2px solid; }
  .hud-corner-tr     { top: 0; right: 0; border-top: 2px solid; border-right: 2px solid; }
  .hud-corner-bl     { bottom: 0; left: 0; border-bottom: 2px solid; border-left: 2px solid; }

  /* Pulsing progress bar */
  @keyframes progressPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  @keyframes progressSweep {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(200%); }
  }
  .progress-bar-fill {
    animation: progressPulse 2s ease-in-out infinite;
  }
  .progress-bar-sweep {
    animation: progressSweep 2.5s ease-in-out infinite;
  }

  /* Scanline effect */
  @keyframes scanline {
    0% { transform: translateY(-100%); }
    100% { transform: translateY(100vh); }
  }
  .scanline {
    animation: scanline 8s linear infinite;
  }

  /* Blinking cursor */
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }
  .cursor-blink {
    animation: blink 1s step-end infinite;
  }

  /* Subtle float for the HUD frame */
  @keyframes hudFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  .hud-float {
    animation: hudFloat 6s ease-in-out infinite;
  }

  h1, h2, h3, blockquote { letter-spacing: -0.05em; }
  body { font-feature-settings: "palt"; }
</style>
